<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронювання квитків — RESONANCE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #070707; color: #fff; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #d89a4a; padding-bottom: 10px; }
        .header a { color: #d89a4a; text-decoration: none; font-weight: bold; text-transform: uppercase; }
        .container { display: flex; gap: 30px; max-width: 1200px; margin: auto; flex-wrap: wrap; }
        .hall { flex: 2; min-width: 750px; }
        .sidebar { flex: 1; min-width: 300px; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid rgba(216, 154, 74, 0.3); height: fit-content; }
        select, button { width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; margin-top: 10px; }
        select { background: #222; color: #fff; border: 1px solid #d89a4a; }
        button { background: #d89a4a; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
        button:hover:not(:disabled) { background: #f4b76e; }
        .stage { text-align: center; color: #d89a4a; letter-spacing: 10px; padding-bottom: 10px; border-bottom: 2px solid #d89a4a; margin: 30px 0; font-size: 18px; width: 100%; }
        .row { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; align-items: center; }
        .row span { width: 70px; color: #d89a4a; font-size: 13px; text-align: right; margin-right: 10px; }
        .seat { width: 32px; height: 32px; background: #333; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid #555; transition: 0.2s; }
        .seat:hover:not(.occupied) { background: #d89a4a; color: #000; border-color: #fff; }
        .seat.selected { background: #d89a4a; color: #000; border-color: #fff; }
        .seat.occupied { background: #111; color: #444; border-color: #222; cursor: not-allowed; }
        .columns-header { display: flex; justify-content: center; margin-bottom: 15px; font-size: 14px; color: #d89a4a; font-weight: bold; }
        .col-label { text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <a href="#">RESONANCE</a>
        <a href="index.html">На головну</a>
    </div>

    <div class="container">
        <div class="hall">
            <h2>Оберіть виставу:</h2>
            <select id="sessionSelect" onchange="loadSession()">
                <option value="">— Оберіть виставу та дату —</option>
            </select>

            <div class="stage">СЦЕНА</div>
            <div id="seatsGrid"></div>
        </div>

        <div class="sidebar">
            <h3>Ваше замовлення</h3>
            <p style="color: #aaa;">Місця: <span id="selectedTags" style="color: #fff;">Не обрано</span></p>
            <h2 style="color: #d89a4a;">Разом: <span id="totalAmount">0</span> грн</h2>
            <button id="payBtn" disabled>Оплатити на картку</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwF-slU_UN6fzm5c1_ID5jqH4GdIWIpEcU3xyBeipmNdPPMza9MDLZKn_fdzSZ_0uI/exec";

        const performances = [
            { key: "27.04", title: "Цікавий випадок", dateStr: "27 квітня, 18:00" },
            { key: "29.04", title: "Цікавий випадок", dateStr: "29 квітня, 18:00" }
        ];

        let currentSessionKey = null;
        let occupiedSeats = [];
        let selectedSeats = [];

        const selectEl = document.getElementById('sessionSelect');
        performances.forEach(perf => {
            selectEl.innerHTML += `<option value="${perf.key}">${perf.title} — ${perf.dateStr}</option>`;
        });

        async function sendPost(data) {
            const params = new URLSearchParams();
            for (let key in data) {
                params.append(key, typeof data[key] === 'object' ? JSON.stringify(data[key]) : data[key]);
            }
            return fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
        }

        async function loadOccupied() {
            try {
                const [hallRes, ordersRes] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getHall`),
                    fetch(`${SCRIPT_URL}?action=getOrders`)
                ]);

                const allSessions = await hallRes.json();
                const allOrders = await ordersRes.json();

                let occupied = allSessions[currentSessionKey] || [];

                allOrders.forEach(order => {
                    if (String(order.sessionKey) === currentSessionKey) {
                        const keys = Array.isArray(order.seatKeys) 
                            ? order.seatKeys 
                            : (order.seatKeys ? String(order.seatKeys).split(',') : []);
                        
                        keys.forEach(k => {
                            if (!occupied.includes(k)) occupied.push(k);
                        });
                    }
                });
                occupiedSeats = occupied;
            } catch(e) {
                console.error("Помилка синхронізації:", e);
                occupiedSeats = [];
            }
        }

        async function loadSession() {
            currentSessionKey = selectEl.value;
            if (!currentSessionKey) {
                document.getElementById('seatsGrid').innerHTML = '';
                return;
            }
            selectedSeats = [];
            document.getElementById('seatsGrid').innerHTML = '<p style="text-align:center">Оновлення схеми залу...</p>';
            
            await loadOccupied();
            renderHall();
            updateCart();
        }

        function renderHall() {
            const grid = document.getElementById('seatsGrid');
            grid.innerHTML = `
                <div class="columns-header">
                    <div style="width: 80px;"></div> 
                    <div style="width: 155px;" class="col-label">4 місця</div>
                    <div style="width: 30px;"></div>
                    <div style="width: 395px;" class="col-label">10 центр</div>
                    <div style="width: 30px;"></div>
                    <div style="width: 115px;" class="col-label">3 край</div>
                </div>
            `;

            for (let r = 1; r <= 12; r++) {
                if (r === 5) continue; 
                let numSeats = (r === 6 || r === 11 || r === 12) ? 14 : 17;
                let rowHTML = `<div class="row"><span>Ряд ${r}</span>`;

                for (let s = 1; s <= 17; s++) {
                    if (s <= numSeats) {
                        const key = `${r}-${s}`;
                        const isOccupied = occupiedSeats.includes(key);
                        const className = isOccupied ? 'seat occupied' : 'seat';
                        rowHTML += `<div class="${className}" onclick="toggleSeat(this, '${key}', ${r}, ${s})">${s}</div>`;
                    } else {
                        rowHTML += `<div class="seat" style="visibility: hidden;"></div>`;
                    }
                    if (s === 4 || s === 14) rowHTML += `<div style="width: 30px;"></div>`;
                }
                rowHTML += `</div>`;
                grid.innerHTML += rowHTML;
            }
        }

        function toggleSeat(element, key, row, seatNum) {
            if (element.classList.contains('occupied')) return;
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedSeats = selectedSeats.filter(s => s.key !== key);
            } else {
                element.classList.add('selected');
                const price = row <= 2 ? 250 : 200;
                selectedSeats.push({ key, row, seatNum, price });
            }
            updateCart();
        }

        function updateCart() {
            const tags = document.getElementById('selectedTags');
            const totalEl = document.getElementById('totalAmount');
            const btn = document.getElementById('payBtn');

            if (selectedSeats.length === 0) {
                tags.innerText = "Не обрано";
                totalEl.innerText = "0";
            } else {
                tags.innerText = selectedSeats.map(s => `Р${s.row}М${s.seatNum}`).join(', ');
                totalEl.innerText = selectedSeats.reduce((acc, s) => acc + s.price, 0);
            }
            btn.disabled = selectedSeats.length === 0;
        }

        document.getElementById('payBtn').onclick = async () => {
            const phone = prompt("Введіть ваш номер телефону. Адміністратор зв'яжеться з вами для підтвердження:");
            if (!phone) return;

            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.innerText = "ОБРОБКА...";

            const totalSum = selectedSeats.reduce((sum, s) => sum + s.price, 0);
            const seatKeys = selectedSeats.map(s => s.key);

            try {
                await sendPost({
                    action: "saveOrder",
                    id: Date.now(),
                    sessionKey: currentSessionKey,
                    phone: phone,
                    seatKeys: seatKeys,
                    totalPrice: totalSum,
                    status: 'waiting_payment'
                });

                // Локально оновлюємо для миттєвого відображення
                occupiedSeats = [...occupiedSeats, ...seatKeys];
                
                const res = await fetch(`${SCRIPT_URL}?action=getHall`);
                const allSessions = await res.json();
                allSessions[currentSessionKey] = occupiedSeats;

                await sendPost({
                    action: "saveHall",
                    hallSessions: allSessions
                });

                alert(`✅ Замовлення прийнято!\nСума: ${totalSum} грн.\nРеквізити картки: 4874 1000 2745 5610.\nПісля оплати адміністратор підтвердить замовлення.`);
                
                await loadSession();

            } catch (e) {
                console.error(e);
                alert("Сталася помилка. Спробуйте ще раз або зверніться до підтримки.");
            } finally {
                btn.innerText = "Оплатити на картку";
                btn.disabled = selectedSeats.length === 0;
            }
        };
    </script>
</body>
</html>
