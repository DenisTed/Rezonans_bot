<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Театр «Резонанс» — Головна</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  
  <style>
    /* Тільки те, що дійсно потрібно саме для головної (дуже мало) */
    .hero {
      background: linear-gradient(rgba(0,0,0,0.65), rgba(15,10,7,0.92)),
                  url("theatre-bg.png") center/cover no-repeat;
    }

    .user-account-btn {
      background: linear-gradient(90deg, #d89a4a, #f1c27d);
      color: #1a0f08 !important;
      font-weight: 700;
      border-color: #f1c27d;
    }
  </style>
</head>

<body class="page-home">

  <!-- Анімація переходу -->
  <div class="page-transition is-entering" id="pageTransition">
    <div class="page-transition__curtain page-transition__curtain--left"></div>
    <div class="page-transition__curtain page-transition__curtain--right"></div>
    <div class="page-transition__glow"></div>
  </div>

  <main>
    <section class="hero">
      <div class="hero-content">

        <!-- Ліва частина — текст і меню -->
        <div class="hero-info-group">
          <div class="hero-text-top">
            <h1>Театр «Резонанс»</h1>
            <p>Афіші, прем’єри та живі хроніки підготовки вистав у самому серці театрального затишку.</p>
          </div>

          <div class="menu-container">
            <div class="nav-main-links">
              <a href="booking.html" class="hero-btn js-page-link">Купити білет</a>
              <a href="afisha.html" class="hero-btn js-page-link">Афіша</a>
              <a href="repertoire.html" class="hero-btn js-page-link">Репертуар</a>
              
              <a href="contacts.html" class="dropdown-item js-page-link">Контакти</a>
                  <a href="history.html" class="dropdown-item js-page-link">Історія театру</a>
            </div>

            
          </div>
        </div>

        <!-- Права частина — Хроніки залаштунків -->
        <div class="theatre-news-feed">
          <h2 class="feed-title">ХРОНІКИ ЗАЛАШТУНКІВ</h2>
          <div class="news-scroll-container">
            <article class="news-post">
              <div class="news-post-image"></div>
              <div class="news-post-content">
                <span class="status-tag">Репетиція</span>
                <h3>«Цікавий випадок у психологічній практиці»</h3>
                <p>Вже йдемо на фінальні прогони. Ведуться інтенсивні репетиції.</p>
              </div>
            </article>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script>
    // Авторизація кнопки (оновлений варіант)
    document.addEventListener('DOMContentLoaded', () => {
      const authBtn = document.getElementById('authButton');
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const userName = localStorage.getItem('userName');

      if (isLoggedIn === 'true' && userName && authBtn) {
        authBtn.href = 'profile.html';
        authBtn.classList.add('user-account-btn');
        authBtn.innerHTML = `
          <span style="margin-right: 8px;">👤</span>
          <span>${userName.toUpperCase()}</span>
        `;
      }
    });
  </script>
</body>
</html>
