<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Репертуар — Театр «Резонанс»</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  
  <style>
    .page-repertoire {
      background: #0a0805;
      min-height: 100dvh;
      padding: 40px 20px;
    }

    .afisha-container {
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }

    .afisha-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 50px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .afisha-header h2 {
      font-size: clamp(32px, 5vw, 48px);
      color: #f6e6cf;
      margin: 0;
      letter-spacing: -1px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 40px;
      margin-bottom: 60px;
    }

    .featured-wrapper {
      animation: fadeUp 0.9s ease forwards;
    }

    .poster-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(216,154,74,0.25);
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .poster-card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: var(--gold);
      box-shadow: 0 30px 70px rgba(216,154,74,0.3);
    }

    .poster-image {
      height: 480px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .poster-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(10,8,5,0.92) 100%);
    }

    .poster-info {
      padding: 28px 32px;
      text-align: center;
    }

    .poster-meta {
      display: inline-block;
      background: rgba(216,154,74,0.15);
      color: var(--gold-soft);
      font-size: 13px;
      letter-spacing: 2px;
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 12px;
    }

    .poster-info h3 {
      font-size: 26px;
      color: #f6e6cf;
      margin: 0 0 12px 0;
      line-height: 1.2;
    }

    .poster-date {
      color: #d9c3a3;
      font-size: 17px;
      opacity: 0.9;
    }

    .coming-soon-text {
      text-align: center;
      color: var(--text-soft);
      font-size: 17px;
      font-style: italic;
      opacity: 0.75;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body class="page-repertoire">

  <!-- Анімація переходу -->
  <div class="page-transition is-entering" id="pageTransition">
    <div class="page-transition__curtain page-transition__curtain--left"></div>
    <div class="page-transition__curtain page-transition__curtain--right"></div>
    <div class="page-transition__glow"></div>
  </div>

  <main>
    <section class="afisha-section">
      <div class="afisha-container">

        <div class="afisha-header">
          <h2>Репертуар</h2>
          <a href="index.html" class="back-link js-page-link">← Назад на головну</a>
        </div>

        <!-- Сітка вистав -->
        <div class="cards">

          <!-- Вистав 1 -->
          <div class="featured-wrapper">
            <div class="poster-card">
              <div class="poster-image" style="background-image: url('img/performance1.jpg');"></div>
              <div class="poster-info">
                <div class="poster-meta">Трагікомедія</div>
                <h3>Назва вистави 1</h3>
                <p class="poster-date">У поточному сезоні • 2026</p>
              </div>
            </div>
          </div>

          <!-- Вистав 2 -->
          <div class="featured-wrapper">
            <div class="poster-card">
              <div class="poster-image" style="background-image: url('img/performance2.jpg');"></div>
              <div class="poster-info">
                <div class="poster-meta">Драма</div>
                <h3>Назва вистави 2</h3>
                <p class="poster-date">Архівна • В репертуарі</p>
              </div>
            </div>
          </div>

        </div>

        <p class="coming-soon-text">
          Повний перелік вистав нашого театру.<br>
          Нові прем’єри вже готуються.
        </p>

      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
