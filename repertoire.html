<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Репертуар — Театр «Резонанс»</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  
  <style>
    /* Глобальні налаштування фону */
    .page-repertoire {
      background: linear-gradient(rgba(10, 8, 5, 0.92), rgba(10, 8, 5, 0.92)), 
                  url('img/theatre-bg.jpg') center/cover no-repeat fixed;
      min-height: 100dvh;
      padding: 40px 20px;
      color: #f6e6cf;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Хедер сторінки */
    .repertoire-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 50px;
    }

    .repertoire-header h2 {
      font-size: clamp(26px, 5vw, 38px);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0;
      font-weight: 300;
      text-shadow: 0 0 20px rgba(216, 154, 74, 0.3);
    }

    .back-link {
      background: rgba(216, 154, 74, 0.05);
      border: 1px solid #d89a4a;
      color: #d89a4a;
      padding: 10px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: #d89a4a;
      color: #1a0f08;
      box-shadow: 0 0 20px rgba(216, 154, 74, 0.4);
    }

    /* Сітка карток */
    .repertoire-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    /* Картка вистави */
    .play-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(216, 154, 74, 0.15);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .play-card:hover {
      transform: translateY(-12px);
      border-color: rgba(216, 154, 74, 0.6);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* Контейнер для фото з ефектом масштабування */
    .play-thumb {
      height: 400px;
      overflow: hidden;
      position: relative;
    }

    .play-thumb-img {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      transition: transform 0.8s ease;
    }

    .play-card:hover .play-thumb-img {
      transform: scale(1.1);
    }

    /* Градієнт поверх фото */
    .play-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(10, 8, 5, 0.8) 100%);
    }

    /* Інфо-блок картки */
    .play-body {
      padding: 25px;
      text-align: center;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .play-category {
      color: #d89a4a;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .play-title {
      font-size: 22px;
      margin: 0 0 12px 0;
      font-weight: 400;
      line-height: 1.3;
      min-height: 58px; /* Тримає висоту назви */
    }

    .play-meta {
      color: #d9c3a3;
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 20px;
    }

    /* Кнопка всередині картки */
    .more-btn {
      margin-top: auto;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #f6e6cf;
      border-bottom: 1px solid #d89a4a;
      padding-bottom: 4px;
      transition: 0.3s;
    }

    .play-card:hover .more-btn {
      color: #d89a4a;
      padding-left: 10px;
      padding-right: 10px;
    }

    /* Футер тексту */
    .coming-soon-text {
      text-align: center;
      margin-top: 60px;
      color: #d9c3a3;
      opacity: 0.4;
      font-size: 14px;
      line-height: 1.6;
      border-top: 1px solid rgba(216, 154, 74, 0.1);
      padding-top: 30px;
    }

    /* Мобільна версія */
    @media (max-width: 480px) {
      .repertoire-header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .play-thumb {
        height: 320px;
      }
    }
  </style>
</head>
<body class="page-repertoire">

  <div class="page-transition is-entering" id="pageTransition">
    <div class="page-transition__curtain page-transition__curtain--left"></div>
    <div class="page-transition__curtain page-transition__curtain--right"></div>
    <div class="page-transition__glow"></div>
  </div>

  <main class="container">
    <header class="repertoire-header">
      <h2>Репертуар</h2>
      <a href="index.html" class="back-link">← На Головну</a>
    </header>

    <div class="repertoire-grid">
      
      <a href="" class="play-card">
        <div class="play-thumb">
          <div class="play-thumb-img" style="background-image: url('css/a_pcix.jpg');"></div>
        </div>
        <div class="play-body">
          <div class="play-category">Психологічна комедія</div>
          <h3 class="play-title">Цікавий випадок у психологічній практиці</h3>
          <div class="play-meta">ЦДУ ім. В. Винниченка • 2026</div>
          <div class="more-btn">Дивитися афішу</div>
        </div>
      </a>

      </div>

    <footer class="coming-soon-text">
      Кожна вистава театру «Резонанс» — це окремий світ.<br>
      Стежте за оновленнями репертуару в наших соцмережах.
    </footer>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
