<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Репертуар — Театр «Резонанс»</title>
  <style>
    /* Глобальні налаштування */
    .page-repertoire {
      background: linear-gradient(rgba(10, 8, 5, 0.92), rgba(10, 8, 5, 0.92)), 
                  url('img/theatre-bg.jpg') center/cover no-repeat fixed;
      min-height: 100dvh;
      padding: 40px 20px;
      color: #f6e6cf;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Хедер сторінки */
    .repertoire-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 50px;
    }

    .repertoire-header h2 {
      font-size: clamp(26px, 5vw, 38px);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0;
      font-weight: 300;
      text-shadow: 0 0 20px rgba(216, 154, 74, 0.3);
    }

    .back-link {
      background: rgba(216, 154, 74, 0.05);
      border: 1px solid #d89a4a;
      color: #d89a4a;
      padding: 10px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: #d89a4a;
      color: #1a0f08;
    }

    /* СІТКА - ЦЕНТРУВАННЯ */
    .repertoire-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    /* Картка вистави (тепер просто блок) */
    .play-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(216, 154, 74, 0.15);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 380px;
      cursor: default; /* Прибрали вказівник */
    }

    .play-card:hover {
      transform: translateY(-5px); /* Зменшив ефект підйому, бо це не кнопка */
      border-color: rgba(216, 154, 74, 0.4);
      background: rgba(255, 255, 255, 0.05);
    }

    .play-thumb {
      height: 480px;
      overflow: hidden;
      position: relative;
    }

    .play-thumb-img {
  width: 100%;
  height: 100%;
  /* background-size: contain — тепер фото впишеться повністю без обрізок */
  background-size: contain; 
  background-position: center;
  background-repeat: no-repeat; /* Щоб фото не дублювалося, якщо блок більший за картинку */
  transition: transform 0.8s ease;
}

    /* Легкий зум при наведенні залишаємо для ефекту "живої" картки */
    .play-card:hover .play-thumb-img {
      transform: scale(1.03);
    }

    .play-body {
      padding: 30px 20px;
      text-align: center;
    }

    .play-category {
      color: #d89a4a;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 15px;
      font-weight: 700;
      opacity: 0.9;
    }

    .play-title {
      font-size: 24px;
      margin: 0 0 15px 0;
      font-weight: 400;
      line-height: 1.2;
      color: #fff;
    }

    .play-meta {
      color: #d9c3a3;
      font-size: 15px;
      opacity: 0.6;
    }

    .coming-soon-text {
      text-align: center;
      margin-top: 80px;
      color: #d9c3a3;
      opacity: 0.4;
      font-size: 14px;
      border-top: 1px solid rgba(216, 154, 74, 0.1);
      padding-top: 30px;
    }

    @media (max-width: 480px) {
      .repertoire-header { flex-direction: column; gap: 20px; }
      .play-thumb { height: 400px; }
    }
  </style>
</head>
<body class="page-repertoire">

  <main class="container">
    <header class="repertoire-header">
      <h2>Репертуар</h2>
      <a href="index.html" class="back-link">← На Головну</a>
    </header>

    <div class="repertoire-grid">
      
      <div class="play-card">
        <div class="play-thumb">
          <div class="play-thumb-img" style="background-image: url('css/a_pcix.jpg');"></div>
        </div>
        <div class="play-body">
          <div class="play-category">Психологічна комедія</div>
          <h3 class="play-title">Цікавий випадок у психологічній практиці</h3>
          <div class="play-meta">ЦДУ ім. В. Винниченка • 2026</div>
        </div>
      </div>

    </div>

    <footer class="coming-soon-text">
      Кожна вистава театру «Резонанс» — це окремий світ.<br>
      Стежте за оновленнями репертуару в наших соцмережах.
    </footer>
  </main>

</body>
</html>
