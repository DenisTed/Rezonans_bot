<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Афіша — Театр «Резонанс»</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  
  <style>
    .afisha-page {
      background: #0a0a0a;
      min-height: 100dvh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
    }

    .afisha-container {
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    .afisha-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .back-btn {
      background: linear-gradient(to right, #3c2a1f, #2a1f18);
      border: 2px solid #d89a4a;
      color: #f6e6cf;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: #d89a4a;
      color: #1a0f08;
      transform: translateY(-2px);
    }

    .nearest-badge {
      background: linear-gradient(90deg, #d89a4a, #f1c27d);
      color: #1a0f08;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 10px 32px;
      border-radius: 50px;
      text-transform: uppercase;
      box-shadow: 0 0 30px rgba(216, 154, 74, 0.6);
      white-space: nowrap;
    }

    .genre {
      font-size: 18px;
      color: #d9c3a3;
      margin-top: 30px;
      letter-spacing: 1px;
    }

    .title {
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.1;
      font-weight: 400;
      color: #f6e6cf;
      margin: 12px 0 16px;
    }

    .date {
      font-size: 19px;
      color: #d9c3a3;
      margin-bottom: 40px;
    }

    .buy-btn {
      width: 100%;
      max-width: 820px;
      padding: 22px;
      background: linear-gradient(to right, #3c1f1f, #2a1414);
      border: 2px solid #d89a4a;
      color: #f6e6cf;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s ease;
      margin: 0 auto;
      display: block;
    }

    .buy-btn:hover {
      background: #d89a4a;
      color: #1a0f08;
      transform: scale(1.03);
      box-shadow: 0 0 40px rgba(216, 154, 74, 0.7);
    }

    .coming-soon {
      text-align: center;
      color: #d9c3a3;
      font-size: 16px;
      opacity: 0.75;
      margin-top: 60px;
      line-height: 1.6;
    }
  </style>
</head>
<body class="page-afisha">

  <div class="page-transition is-entering" id="pageTransition">
    <div class="page-transition__curtain page-transition__curtain--left"></div>
    <div class="page-transition__curtain page-transition__curtain--right"></div>
    <div class="page-transition__glow"></div>
  </div>

  <main class="afisha-page">
    <div class="afisha-container">

      <!-- Заголовок + кнопка назад -->
      <div class="afisha-header">
        <h1 style="font-size: 28px; color: #f6e6cf; margin: 0;">Афіша</h1>
        <a href="index.html" class="back-btn js-page-link">
          ← Назад на головну
        </a>
      </div>

      <!-- Найближча вистава -->
      <div class="nearest-badge">НАЙБЛИЖЧА ВИСТАВА</div>

      <div class="genre">Психологічна комедія</div>
      <h2 class="title">Цікавий випадок у психологічній практиці</h2>
      <div class="date">Травень 2026 • Фінальні прогони</div>

      <!-- Кнопка квитків -->
      <button onclick="startPurchase('Цікавий випадок у психологічній практиці')" class="buy-btn">
        КВИТКИ ВІД 250 ГРН
      </button>

      <!-- Нижній текст -->
      <p class="coming-soon">
        Нові вистави вже готуються.<br>
        Слідкуйте за хроніками залаштунків на головній сторінці.
      </p>

    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
