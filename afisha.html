<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Афіша — Театр «Резонанс»</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  
  <style>
    .afisha-page {
      /* ДОДАНО ФОН (аналогічно головній сторінці) */
      background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.95)), 
                  url('img/theatre-bg.jpg') center/cover no-repeat fixed;
      min-height: 100dvh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
    }

    .afisha-container {
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    .afisha-header {
      display: flex;
      align-items: center;
      justify-content: space-between; /* Розніс назву і кнопку */
      gap: 20px;
      margin-bottom: 60px;
    }

    .back-btn {
      background: linear-gradient(to right, #3c2a1f, #2a1f18);
      border: 2px solid #d89a4a;
      color: #f6e6cf;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: #d89a4a;
      color: #1a0f08;
      transform: translateY(-2px);
    }

    .nearest-badge {
      background: linear-gradient(90deg, #d89a4a, #f1c27d);
      color: #1a0f08;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      padding: 8px 24px;
      border-radius: 50px;
      text-transform: uppercase;
      box-shadow: 0 0 25px rgba(216, 154, 74, 0.4);
      display: inline-block;
      margin-bottom: 20px;
    }

    .genre {
      font-size: 18px;
      color: #d9c3a3;
      letter-spacing: 1px;
      font-style: italic;
    }

    .title {
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1.1;
      font-weight: 400;
      color: #f6e6cf;
      margin: 15px 0 20px;
      text-shadow: 0 0 30px rgba(216, 154, 74, 0.3);
    }

    .date {
      font-size: 20px;
      color: #f1c27d;
      margin-bottom: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .buy-btn {
      width: 100%;
      max-width: 820px;
      padding: 24px;
      /* Темно-червоний театральний градієнт */
      background: linear-gradient(to right, #5e1a1a, #3a0d0d);
      border: 2px solid #d89a4a;
      color: #f6e6cf;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin: 0 auto;
      display: block;
      text-decoration: none;
      text-align: center;
    }

    .buy-btn:hover {
      background: #d89a4a;
      color: #1a0f08;
      transform: scale(1.02);
      box-shadow: 0 15px 40px rgba(216, 154, 74, 0.5);
    }

    .coming-soon {
      text-align: center;
      color: #d9c3a3;
      font-size: 15px;
      opacity: 0.6;
      margin-top: 80px;
      line-height: 1.8;
      border-top: 1px solid rgba(216, 154, 74, 0.2);
      padding-top: 30px;
    }
  </style>
</head>
<body class="page-afisha">

  <div class="page-transition is-entering" id="pageTransition">
    <div class="page-transition__curtain page-transition__curtain--left"></div>
    <div class="page-transition__curtain page-transition__curtain--right"></div>
    <div class="page-transition__glow"></div>
  </div>

  <main class="afisha-page">
    <div class="afisha-container">

      <div class="afisha-header">
        <h1 style="font-size: 32px; color: #f6e6cf; margin: 0; letter-spacing: 2px;">АФІША</h1>
        <a href="index.html" class="back-btn">
          ← Головна
        </a>
      </div>

      <div class="nearest-badge">Найближча прем'єра</div>

      <div class="genre">Психологічна комедія</div>
      <h2 class="title">Цікавий випадок у психологічній практиці</h2>
      
      <div class="date">
        <span>📅 Травень 2026</span>
        <span style="color: rgba(216,154,74,0.5)">|</span>
        <span>📍 Велика сцена</span>
      </div>

      <a href="booking.html" class="buy-btn">
        ПРИДБАТИ КВИТКИ — ВІД 250 ГРН
      </a>

      <p class="coming-soon">
        Нові постановки знаходяться на етапі репетицій.<br>
        Слідкуйте за оновленнями в наших соцмережах та "Хроніках залаштунків".
      </p>

    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
