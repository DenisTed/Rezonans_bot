<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-центр — Театр Резонанс</title>
    <style>
        /* БАЗОВІ СТИЛІ ТА ДИЗАЙН */
        :root {
            --gold: #d89a4a;
            --dark: #0a0805;
            --bg-card: #14110d;
            --text-soft: #a8a095;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--gold); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        .header h2 { color: var(--gold); margin: 0; letter-spacing: 2px; font-weight: 300; }

        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .sidebar { flex: 1; min-width: 280px; background: var(--bg-card); padding: 20px; border-radius: 15px; border: 1px solid rgba(216, 154, 74, 0.2); }
        .main { flex: 3; min-width: 320px; }

        .card { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h3 { color: var(--gold); margin: 0 0 15px 0; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }

        input, select, button { 
            width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; 
            background: #1a1713; color: #fff; border: 1px solid #332f2a; border-radius: 8px; 
        }

        button { font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-green { background: #2d5a27; color: #fff; }
        .btn-red { background: #7a2a2a; color: #fff; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* ЗАЛ ТА КРІСЛА */
        .hall-wrapper { overflow-x: auto; padding: 20px 0; text-align: center; }
        .row { display: flex; gap: 6px; margin-bottom: 8px; justify-content: center; min-width: 600px; }
        .seat { 
            width: 28px; height: 28px; background: #2a2621; display: flex; 
            align-items: center; justify-content: center; font-size: 10px; 
            cursor: pointer; border-radius: 4px; border: 1px solid #3d3831; transition: 0.2s;
        }
        .seat.occupied { background: #7a2a2a; border-color: #ff4d4d; color: #fff; cursor: not-allowed; }
        .seat.selected { background: var(--gold) !important; color: #000; border-color: #fff; }

        /* СПИСОК ЗАМОВЛЕНЬ */
        .order { 
            background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 10px; 
            border-left: 3px solid var(--gold); border-radius: 8px; 
        }

        /* АДАПТИВНІСТЬ */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .main { min-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>RESONANCE | ADMIN</h2>
        <div style="display: flex; gap: 10px;">
            <a href="index.html" style="color: #ccc; text-decoration: none; padding-top: 8px;">🔙 На сайт</a>
            <button class="btn-red" style="width: auto;" onclick="logout()">Вихід</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h3>Каса (Оплачено)</h3>
            <div id="statsBox" style="font-size: 24px; color: var(--gold); font-weight: bold;">0 грн</div>
            <p id="ticketCount" style="color: var(--text-soft); font-size: 14px;">0 квитків</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <button class="btn-red" style="font-size: 12px; opacity: 0.6;" onclick="resetSystem()">Очистити локальну базу</button>
        </div>

        <div class="main">
            <div class="card">
                <h3>Активний сеанс</h3>
                <select id="sessionSelect" onchange="loadData()"></select>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
                <div class="card">
                    <h3>Продаж (Каса)</h3>
                    <input type="text" id="quickPhone" placeholder="Телефон або 'Каса'">
                    <button class="btn-green" onclick="quickSale()">Підтвердити продаж</button>
                </div>
                <div class="card">
                    <h3>Бронь по телефону</h3>
                    <input type="text" id="manualPhone" placeholder="Номер телефону">
                    <input type="text" id="manualSeats" readonly placeholder="Оберіть місця нижче">
                    <button class="btn-gold" onclick="manualBook()">Забронювати</button>
                </div>
            </div>

            <div class="card">
                <h3>Схема залу</h3>
                <div class="hall-wrapper">
                    <div id="hallGrid"></div>
                </div>
            </div>

            <div class="card">
                <h3>Останні замовлення</h3>
                <div id="ordersList"></div>
            </div>
        </div>
    </div>

<script>
    // --- КОНФІГУРАЦІЯ ---
    const PRICE = 250;
    const GOOGLE_SCRIPT_URL = "ВСТАВ_СЮДИ_СВОЄ_ПОСИЛАННЯ"; // Обов'язково встав URL від Google Apps Script
    
    const performances = [
        { id: "1", title: "Цікавий випадок", date: "2026-04-25" }
    ];

    let currentSession = "";
    let selectedSeats = [];

    // --- БАЗА ДАНИХ (LocalStorage) ---
    function getDB(key) { return JSON.parse(localStorage.getItem(key)) || (key === 'theatreOrders' ? [] : {}); }
    function saveDB(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    // --- ІНІЦІАЛІЗАЦІЯ ---
    const select = document.getElementById('sessionSelect');
    performances.forEach(p => select.innerHTML += `<option value="${p.id}|${p.date}">${p.title} (${p.date})</option>`);

    function loadData() {
        currentSession = select.value;
        selectedSeats = []; 
        document.getElementById('manualSeats').value = "";
        renderHall();
        renderOrdersAndStats();
    }

    // --- ВІДОБРАЖЕННЯ ЗАЛУ ---
    function renderHall() {
        const occupied = getDB('hallSessions')[currentSession] || [];
        let html = '';
        for (let r = 1; r <= 10; r++) {
            html += `<div class="row">`;
            for (let s = 1; s <= 15; s++) {
                const key = `${r}-${s}`;
                let statusClass = '';
                if (occupied.includes(key)) statusClass = 'occupied';
                if (selectedSeats.includes(key)) statusClass = 'selected';
                html += `<div class="seat ${statusClass}" onclick="clickSeat('${r}','${s}')">${s}</div>`;
                if (s === 5 || s === 10) html += `<div style="width: 15px;"></div>`;
            }
            html += `</div>`;
        }
        document.getElementById('hallGrid').innerHTML = html;
    }

    window.clickSeat = function(r, s) {
        const key = `${r}-${s}`;
        const occupied = getDB('hallSessions')[currentSession] || [];
        if (occupied.includes(key)) return;

        if (selectedSeats.includes(key)) {
            selectedSeats = selectedSeats.filter(k => k !== key);
        } else {
            selectedSeats.push(key);
        }
        document.getElementById('manualSeats').value = selectedSeats.length ? `Обрано: ${selectedSeats.length} квит.` : "";
        renderHall();
    };

    // --- СИНХРОНІЗАЦІЯ З GOOGLE ---
    async function syncWithGoogle(orderData) {
        if (GOOGLE_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbyrGe33T9HltpN_u-UqAqey39UBQ5JhA7hDmmf6bUAqrCeum-lHXnl1rnWMJZq-pkw4/exec") return;
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(orderData)
            });
        } catch (e) { console.error("Помилка синхронізації", e); }
    }

    // --- ЛОГІКА ПРОДАЖУ ---
    window.quickSale = function() {
        processOrder("Продаж в касі", document.getElementById('quickPhone').value || "КАСА", "paid");
    };

    window.manualBook = function() {
        const phone = document.getElementById('manualPhone').value;
        if (!phone) return alert("Введіть телефон!");
        processOrder("Ручна бронь", phone, "waiting_payment");
    };

    function processOrder(name, phone, status) {
        if (selectedSeats.length === 0) return alert("Оберіть місця!");

        const order = {
            id: Date.now(),
            sessionKey: currentSession,
            clientName: name,
            phone: phone,
            seatKeys: [...selectedSeats],
            totalPrice: selectedSeats.length * PRICE,
            status: status
        };

        // Локально
        let orders = getDB('theatreOrders');
        orders.push(order);
        saveDB('theatreOrders', orders);

        let hall = getDB('hallSessions');
        hall[currentSession] = [...(hall[currentSession] || []), ...selectedSeats];
        saveDB('hallSessions', hall);

        // В хмару
        syncWithGoogle(order);

        loadData();
        alert("Успішно збережено!");
    }

    // --- СТАТИСТИКА ТА СПИСОК ---
    function renderOrdersAndStats() {
        const allOrders = getDB('theatreOrders');
        const sessionOrders = allOrders.filter(o => o.sessionKey === currentSession).reverse();
        
        let html = '';
        let cash = 0, tks = 0;

        sessionOrders.forEach(o => {
            const isPaid = o.status === 'paid';
            if (isPaid) { cash += o.totalPrice; tks += o.seatKeys.length; }
            html += `
                <div class="order">
                    <div style="display:flex; justify-content:space-between; font-size:13px;">
                        <b>${o.phone}</b>
                        <span style="color:${isPaid?'#4caf50':'#ff9800'}">${isPaid?'ОПЛАЧЕНО':'БРОНЬ'}</span>
                    </div>
                    <div style="color:var(--text-soft); font-size:12px; margin-top:5px;">
                        ${o.seatKeys.length} квит. на суму ${o.totalPrice} грн
                    </div>
                </div>`;
        });

        document.getElementById('ordersList').innerHTML = html || "Замовлень поки немає";
        document.getElementById('statsBox').innerText = `${cash} грн`;
        document.getElementById('ticketCount').innerText = `${tks} квитків продано`;
    }

    // --- СИСТЕМНІ ФУНКЦІЇ ---
    window.logout = () => { localStorage.removeItem('adminLoggedIn'); window.location.href = "login.html"; };
    window.resetSystem = () => { if(confirm("Видалити всі дані з цього браузера?")) { localStorage.clear(); location.reload(); }};

    if (localStorage.getItem('adminLoggedIn') !== 'true') window.location.href = "login.html";
    
    loadData();
</script>
</body>
</html>
